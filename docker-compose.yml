services:

  mysql:

    image: mysql:8.0

    container_name: ecommerce_mysql

    restart: always

    environment:
      MYSQL_ROOT_PASSWORD: 123456
      MYSQL_DATABASE: ecommerce

    ports:
      - "3307:3306"

    volumes:
      - mysql_data:/var/lib/mysql

  api:

    build: .

    container_name: ecommerce_api

    depends_on:
      - mysql

    ports:
      - "8000:8000"

    env_file:
      - .env

volumes:
  mysql_data: